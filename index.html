<style>
  :root{
    --bg:#eef2ef; --card:#fff; --ink:#1f2933; --green:#2f7d52; --greenSoft:#e7f3ec;
    --orange:#c2541b; --orangeSoft:#fcf3ec; --grey:#7b8794; --line:#dde5df;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh; display:flex; justify-content:center;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    -webkit-user-select:none; user-select:none;
  }
  .wrap{width:100%; max-width:440px; padding-top:18px;}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:18px;letter-spacing:-.3px;}
  .dot{width:22px;height:22px;border-radius:6px;background:var(--green);display:inline-block;
       -webkit-mask:var(--db) center/contain no-repeat; mask:var(--db) center/contain no-repeat;}
  .badge{background:var(--green);color:#fff;font-weight:700;font-size:13px;padding:5px 12px;border-radius:999px;}
  .tap{
    width:100%; background:var(--card); border:2px solid var(--green); border-radius:24px;
    box-shadow:0 6px 20px rgba(31,41,51,.06); padding:30px 16px 22px; cursor:pointer;
    text-align:center; transition:transform .09s ease, background .2s ease, border-color .2s ease;
    touch-action:manipulation;
  }
  .tap.press{transform:scale(.985);}
  .tap.rest{background:var(--orangeSoft); border-color:var(--orange);}
  .tlabel{font-size:13px;color:var(--grey);font-weight:600;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;}
  .big{font-size:132px;line-height:1;font-weight:800;letter-spacing:-3px;font-variant-numeric:tabular-nums;}
  .tap.rest .big{color:var(--orange);}
  .timers{display:flex;align-items:center;justify-content:center;gap:24px;margin-top:12px;}
  .sep{width:1px;height:28px;background:var(--line);}
  .stat{display:flex;flex-direction:column;align-items:center;}
  .stat .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1;}
  .stat .v.big{font-size:34px;}
  .stat .l{font-size:11px;color:var(--grey);font-weight:600;margin-top:2px;}
  .idle{color:var(--grey);font-size:14px;margin-top:6px;}
  .controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
  .ctrl{border:none;border-radius:14px;padding:13px 6px;font-weight:700;font-size:13px;
        display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
        font-family:inherit;transition:opacity .15s ease;}
  .ctrl svg{width:20px;height:20px;}
  .ctrl:disabled{opacity:.4;cursor:default;}
  .ctrl.undo{background:#eceff1;color:var(--ink);}
  .ctrl.end{background:var(--green);color:#fff;}
  .ctrl.reset{background:var(--orangeSoft);color:var(--orange);}
  .summary{margin-top:22px;}
  .srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .stitle{font-weight:700;font-size:15px;}
  .stot{color:var(--grey);font-size:13px;}
  .empty{border:1px dashed var(--line);border-radius:16px;padding:22px 16px;text-align:center;color:var(--grey);font-size:14px;}
  .set{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 14px;
       display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .setL{display:flex;align-items:center;gap:12px;}
  .num{background:var(--greenSoft);color:var(--green);font-weight:800;width:30px;height:30px;border-radius:8px;
       font-size:14px;display:flex;align-items:center;justify-content:center;}
  .reps{font-weight:800;font-size:19px;}
  .reps small{font-size:13px;color:var(--grey);font-weight:600;}
  .setR{display:flex;gap:18px;font-size:13px;color:var(--grey);}
  .setR b{color:var(--ink);}
  .foot{color:var(--grey);font-size:12px;margin-top:16px;text-align:center;}
  @media (prefers-reduced-motion: reduce){ .tap{transition:none;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="brand"><span class="dot" id="dot"></span> Contatore</div>
    <span class="badge" id="badge">Serie 1</span>
  </div>

  <button class="tap" id="tap">
    <div class="tlabel" id="tlabel">Ripetizioni</div>
    <div class="big" id="big">0</div>
    <div id="extra"></div>
  </button>

  <div class="controls">
    <button class="ctrl undo" id="undo" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"/></svg>
      Annulla
    </button>
    <button class="ctrl end" id="end" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      Fine serie
    </button>
    <button class="ctrl reset" id="reset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      Azzera
    </button>
  </div>

  <div class="summary">
    <div class="srow">
      <span class="stitle">Serie completate</span>
      <span class="stot" id="stot"></span>
    </div>
    <div id="list"></div>
  </div>

  <p class="foot">Tocca il riquadro ad ogni rep · "Fine serie" salva e fa partire il riposo</p>
</div>

<script>
  var DB = "url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22black%22><rect x=%222%22 y=%2210%22 width=%222.5%22 height=%224%22 rx=%221%22/><rect x=%224.5%22 y=%228%22 width=%222.5%22 height=%228%22 rx=%221%22/><rect x=%227%22 y=%2211%22 width=%2210%22 height=%222%22/><rect x=%2217%22 y=%228%22 width=%222.5%22 height=%228%22 rx=%221%22/><rect x=%2219.5%22 y=%2210%22 width=%222.5%22 height=%224%22 rx=%221%22/></svg>')";
  document.getElementById('dot').style.setProperty('--db', DB);

  var count=0, phase='idle', setNo=1, sets=[], repTimes=[], restStart=null;

  function buzz(p){ try{ navigator.vibrate && navigator.vibrate(p); }catch(e){} }
  function fmt(ms){ return ((ms||0)/1000).toFixed(1); }
  function clock(ms){ var s=Math.floor((ms||0)/1000),m=Math.floor(s/60),r=s%60; return m+':'+(r<10?'0':'')+r; }

  var tap=document.getElementById('tap');
  var big=document.getElementById('big');
  var tlabel=document.getElementById('tlabel');
  var extra=document.getElementById('extra');
  var badge=document.getElementById('badge');
  var undo=document.getElementById('undo');
  var end=document.getElementById('end');
  var stot=document.getElementById('stot');
  var list=document.getElementById('list');

  function addRep(){
    var t=Date.now();
    tap.classList.add('press'); setTimeout(function(){tap.classList.remove('press');},120);
    buzz(15);
    if(phase!=='set'){ repTimes=[t]; restStart=null; phase='set'; count=1; render(); return; }
    repTimes.push(t); count++; render();
  }
  function removeRep(){
    if(count<=0) return; buzz(10); repTimes.pop(); count=Math.max(0,count-1);
    if(count===0) phase='idle'; render();
  }
  function endSet(){
    if(count<=0) return; buzz([20,40,20]);
    var total = repTimes.length>1 ? repTimes[repTimes.length-1]-repTimes[0] : 0;
    var avg = repTimes.length>1 ? total/(repTimes.length-1) : 0;
    sets.push({no:setNo,reps:count,total:total,avg:avg});
    setNo++; count=0; repTimes=[]; restStart=Date.now(); phase='rest'; render();
  }
  function resetAll(){
    buzz(30); count=0; phase='idle'; setNo=1; sets=[]; repTimes=[]; restStart=null; render();
  }

  tap.addEventListener('click', addRep);
  undo.addEventListener('click', removeRep);
  end.addEventListener('click', endSet);
  document.getElementById('reset').addEventListener('click', resetAll);

  function render(){
    badge.textContent='Serie '+setNo;
    tap.classList.toggle('rest', phase==='rest');
    big.textContent = phase==='rest' ? '0' : count;
    undo.disabled = count<=0; end.disabled = count<=0;

    if(phase==='rest') tlabel.textContent='tocca per la prossima serie';
    else tlabel.textContent='Ripetizioni';

    // sets list
    if(sets.length===0){
      stot.textContent='';
      list.innerHTML='<div class="empty">Nessuna serie ancora. Tocca il riquadro per iniziare a contare.</div>';
    } else {
      var totalReps=sets.reduce(function(a,s){return a+s.reps;},0)+(phase==='set'?count:0);
      stot.textContent=totalReps+' rip. totali';
      var html='';
      for(var i=0;i<sets.length;i++){ var s=sets[i];
        html+='<div class="set"><div class="setL"><span class="num">'+s.no+'</span>'+
              '<span class="reps">'+s.reps+' <small>rip.</small></span></div>'+
              '<div class="setR"><span>durata <b>'+clock(s.total)+'</b></span>'+
              '<span>ritmo <b>'+fmt(s.avg)+'s</b>/rep</span></div></div>';
      }
      list.innerHTML=html;
    }
    updateLive();
  }

  function updateLive(){
    if(phase==='set'){
      var lastAt=repTimes[repTimes.length-1];
      var since=lastAt?Date.now()-lastAt:0;
      var elapsed=repTimes[0]?Date.now()-repTimes[0]:0;
      extra.innerHTML='<div class="timers">'+
        '<div class="stat"><span class="v" style="color:var(--green)">'+fmt(since)+'s</span><span class="l">dall\'ultima rep</span></div>'+
        '<div class="sep"></div>'+
        '<div class="stat"><span class="v">'+clock(elapsed)+'</span><span class="l">tempo serie</span></div></div>';
    } else if(phase==='rest'){
      var rest=restStart?Date.now()-restStart:0;
      extra.innerHTML='<div class="timers"><div class="stat"><span class="v big" style="color:var(--orange)">'+clock(rest)+'</span><span class="l">RIPOSO</span></div></div>';
    } else {
      extra.innerHTML='<div class="idle">Tocca qui ad ogni ripetizione</div>';
    }
  }

  setInterval(updateLive, 100);
  render();
</script>
</body>
</html>
